name: agent-collaboration-claim-guard

on:
  issue_comment:
    types: [created, edited]
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  validate-collaboration:
    if: github.event_name == 'pull_request' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build collaboration raw payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = context.payload;
            const issueNumber = payload.pull_request?.number || payload.issue?.number;
            let pr = payload.pull_request;
            if (!pr && payload.issue?.pull_request && issueNumber) {
              const prResponse = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issueNumber
              });
              pr = prResponse.data;
            }

            const comments = [];
            if (issueNumber) {
              const issueComments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                }
              );
              for (const comment of issueComments) {
                comments.push(comment.body || "");
              }
            }

            const result = {
              branch: String(pr?.head?.ref || ""),
              pr_body: pr?.body || "",
              comments
            };
            fs.writeFileSync(
              "agent_collaboration_raw.json",
              JSON.stringify(result, null, 2)
            );

      - name: Normalize collaboration payload
        run: python3 "AGENT协作工具/github-actions/build_agent_collaboration_payload.py" < agent_collaboration_raw.json > agent_collaboration_payload.json

      - name: Run collaboration checker
        run: |
          python3 "AGENT协作工具/github-actions/check_agent_collaboration.py" < agent_collaboration_payload.json > agent_collaboration_result.json
          python3 - <<'PY'
          import json
          import sys

          result = json.load(open("agent_collaboration_result.json", encoding="utf-8"))
          if result.get("decision") != "PASS":
              print(json.dumps(result, ensure_ascii=False, indent=2))
              sys.exit(1)
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY
